name: Deploy and Purge Manifest
on:
  push:
    branches:
      - main

jobs:
  purge-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Purge specific files (manifests)
        uses: jakejarvis/cloudflare-purge-action@v0.3.0
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # قم بتغيير الدومين إلى الدومين الخاص بك
        with:
          args: |
            --files 'https://json.nalsh.nalsh.dpdns.org/stores/nalshi/manifest.json'
