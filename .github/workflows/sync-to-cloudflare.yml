name: Auto Sync JSON to Cloudflare D1 & Cache Purge

on:
  push:
    branches:
      - main # أو اسم الفرع الأساسي لديك
    paths:
      - 'stores/**/*.json' # يراقب أي ملف JSON داخل مجلد stores

jobs:
  sync_and_purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ضروري لجلب تاريخ التعديلات لمعرفة الملفات المتغيرة

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: stores/**/*.json

      - name: Sync Files to Cloudflare Worker
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL }} # رابط الـ Worker (مثل https://worker-name.username.workers.dev)
          WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }} # كلمة السر التي برمجناها في الـ Worker
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "🔄 Syncing and Purging Cache for: $file"
            
            # قراءة محتوى الـ JSON وتجهيزه بأمان باستخدام jq لتجنب أخطاء الفواصل والاقتباسات
            CONTENT=$(jq -c . < "$file")
            PAYLOAD=$(jq -n --arg path "$file" --argjson content "$CONTENT" '{file_path: $path, content: $content}')
            
            # إرسال الطلب إلى Worker
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WORKER_URL" \
              -H "Authorization: Bearer $WORKER_SECRET" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
              
            BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
            STATUS_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)
            
            if [ "$STATUS_CODE" -eq 200 ]; then
              echo "✅ Success for $file: $BODY"
            else
              echo "❌ Failed for $file. Status: $STATUS_CODE. Response: $BODY"
              exit 1 # إيقاف الـ Action في حال الفشل
            fi
          done
